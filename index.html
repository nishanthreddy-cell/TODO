<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Todo | Organize Your Day</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-top">
                <div class="header-brand">
                    <div class="app-logo" aria-hidden="true">
                        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect width="36" height="36" rx="8" fill="currentColor" class="logo-bg"/>
                            <path d="M10 18L15.5 23.5L26 13" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <h1>Todo</h1>
                </div>
                <button id="theme-toggle" class="theme-toggle-btn" aria-label="Switch to light mode" aria-pressed="false">
                    <span class="theme-icon" aria-hidden="true">☀</span>
                </button>
            </div>
            <p class="subtitle">Focus on what matters.</p>
        </header>

        <main class="main-content">
            <div class="create-task-controls">
                <select id="category-input" class="category-select" aria-label="Choose task category">
                    <option value="General" selected>General</option>
                    <option value="Work">Work</option>
                    <option value="Personal">Personal</option>
                    <option value="Study">Study</option>
                    <option value="Shopping">Shopping</option>
                </select>

                <input type="date" id="date-input" class="date-input" aria-label="Choose due date">

                <div class="input-group">
                    <input type="text" id="task-input" placeholder="What needs to be done?" aria-label="Add a new task">
                    <button id="add-btn" aria-label="Add task" class="add-icon-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="filters-container">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <div class="todo-list-wrapper">
                <ul id="todo-list" class="todo-list">
                    <!-- Tasks will be injected here via JavaScript -->
                </ul>

                <div id="empty-state" class="empty-state">
                    <div class="empty-icon">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="3" y="4" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.5" />
                            <path d="M8 10L10 12L16 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                    </div>
                    <p>You're all caught up!</p>
                    <span class="empty-subtext">Add a task above to get started.</span>
                </div>
            </div>

            <div class="stats-container">
                <span id="items-left">0 items left</span>
                <button id="clear-completed" class="clear-btn">Clear completed</button>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>

</html>
